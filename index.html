<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
}header { padding: 15px; background: #000; text-align: center; font-size: 20px; font-weight: bold; }

.tabs { display: flex; overflow-x: auto; background: #1a1a1a; }

.tab { padding: 10px 15px; cursor: pointer; white-space: nowrap; }

.tab.active { color: gold; border-bottom: 2px solid gold; }

.container { padding: 10px; }

.item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 10px 0; }

.item-info { max-width: 70%; }

.item-name { font-size: 16px; font-weight: bold; }

.item-desc { font-size: 12px; color: #aaa; }

.item-price { margin-top: 5px; }

.item img { width: 80px; height: 80px; border-radius: 10px; }

.add-btn { background: gold; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; }

.qty { display: flex; align-items: center; }

.qty button { padding: 5px; }

.cart { position: fixed; bottom: 10px; right: 10px; background: gold; color: black; padding: 10px; border-radius: 10px; display: none; }

@media(min-width:768px) { .container { max-width: 800px; margin: auto; } } </style>

</head>
<body><header>My Restaurant</header><div class="tabs">
  <div class="tab active">South Indian</div>
  <div class="tab">Burger</div>
  <div class="tab">Pasta</div>
</div><div class="container" id="menu">
</div><div class="cart" id="cartBox">🛒 0 items</div><script>
const menuData = [
  {name:"Classic Masala Dosa", price:159, desc:"Crispy dosa with masala", img:"https://via.placeholder.com/80"},
  {name:"Plain Dosa", price:139, desc:"Simple dosa", img:"https://via.placeholder.com/80"},
  {name:"Aloo Tikki Burger", price:99, desc:"Crispy burger", img:"https://via.placeholder.com/80"}
];

let cartCount = 0;

function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  menuData.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-desc">${item.desc}</div>
        <div class="item-price">₹${item.price}</div>
        <button class="add-btn" onclick="addItem(${index})">ADD</button>
      </div>
      <img src="${item.img}" />
    `;

    menu.appendChild(div);
  });
}

function addItem(index) {
  cartCount++;
  updateCart();
}

function updateCart() {
  const cart = document.getElementById("cartBox");
  cart.style.display = "block";
  cart.innerText = `🛒 ${cartCount} items`;
}

renderMenu();
</script></body>
</html>
